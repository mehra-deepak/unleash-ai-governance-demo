services:
  unleash:
    image: unleashorg/unleash-server:latest
    restart: unless-stopped
    ports:
      - "4242:4242"
    environment:
      DATABASE_URL: "postgres://postgres:unleash@db/db"
      DATABASE_SSL: "false"
      LOG_LEVEL: "warn"
      INIT_BACKEND_API_TOKENS: "default:development.unleash-insecure-api-token"
      INIT_FRONTEND_API_TOKENS: "default:development.unleash-insecure-frontend-api-token"
      # Demo-only admin token used by app.py to create/update gpt_5_assistant.
      # Do not use insecure init tokens outside a local demo environment.
      # Admin tokens are root-scoped; unlike SDK tokens, they cannot target one project.
      INIT_ADMIN_API_TOKENS: "*:*.unleash-insecure-admin-api-token"
    depends_on:
      db:
        condition: service_healthy
    healthcheck:
      test: wget --no-verbose --tries=1 --spider http://localhost:4242/health || exit 1
      interval: 2s
      timeout: 1m
      retries: 10
      start_period: 15s

  db:
    image: postgres:15
    restart: unless-stopped
    expose:
      - "5432"
    environment:
      POSTGRES_DB: "db"
      POSTGRES_HOST_AUTH_METHOD: "trust"
    volumes:
      - unleash_db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD", "pg_isready", "--username=postgres", "--host=127.0.0.1", "--port=5432"]
      interval: 2s
      timeout: 1m
      retries: 10
      start_period: 10s

volumes:
  unleash_db_data:
